<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 620" font-family="'Inter', 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrowRadial" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#52B788"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="620" height="620" fill="#F0F7F4"/>

  <!-- Título -->
  <text x="310" y="35" font-size="18" fill="#1B4332" font-weight="700" text-anchor="middle">Proyección de Escalamiento RESPIRA</text>

  <!-- ANILLO 2 EXTERIOR (radio 270) — Valle de Aburrá -->
  <circle cx="310" cy="320" r="270" fill="#52B788" fill-opacity="0.08" stroke="#52B788" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- ANILLO 1 MEDIO (radio 180) — Medellín -->
  <circle cx="310" cy="320" r="180" fill="#2D6A4F" fill-opacity="0.15" stroke="#2D6A4F" stroke-width="2.5" stroke-dasharray="8,4"/>

  <!-- CENTRO (radio 90) — ISC Piloto -->
  <circle cx="310" cy="320" r="90" fill="#1B4332" filter="url(#shadow)"/>

  <!-- Texto centro -->
  <text x="310" y="308" font-size="22" fill="white" font-weight="700" text-anchor="middle">ISC</text>
  <text x="310" y="328" font-size="12" fill="#52B788" text-anchor="middle">Piloto</text>
  <text x="310" y="344" font-size="11" fill="#A8DADC" text-anchor="middle">validado</text>
  <text x="310" y="361" font-size="10" fill="#E9C46A" text-anchor="middle">1 nodo</text>

  <!-- Texto anillo 1: Medellín -->
  <text x="310" y="178" font-size="13" fill="#1B4332" font-weight="700" text-anchor="middle">Medellín — Red escolar</text>
  <text x="310" y="196" font-size="11" fill="#2D6A4F" text-anchor="middle">Si precisión ≥ 80% vs SIATA</text>
  <text x="310" y="213" font-size="10" fill="#2D6A4F" text-anchor="middle" font-style="italic">≈ 5–20 nodos en IEs</text>

  <!-- Texto anillo 2: Valle de Aburrá -->
  <text x="310" y="75" font-size="13" fill="#1B4332" font-weight="700" text-anchor="middle">Valle de Aburrá — Red metropolitana</text>
  <text x="310" y="93" font-size="11" fill="#52B788" text-anchor="middle">Si impacto pedagógico validado</text>
  <text x="310" y="110" font-size="10" fill="#2D6A4F" text-anchor="middle" font-style="italic">≈ 50+ nodos</text>

  <!-- Flechas radiales desde centro hacia afuera -->
  <!-- Arriba -->
  <line x1="310" y1="228" x2="310" y2="143" stroke="#52B788" stroke-width="2" marker-end="url(#arrowRadial)" stroke-dasharray="5,3"/>
  <!-- Derecha superior -->
  <line x1="388" y1="267" x2="458" y2="218" stroke="#52B788" stroke-width="2" marker-end="url(#arrowRadial)" stroke-dasharray="5,3"/>
  <!-- Izquierda superior -->
  <line x1="232" y1="267" x2="162" y2="218" stroke="#52B788" stroke-width="2" marker-end="url(#arrowRadial)" stroke-dasharray="5,3"/>

  <!-- Condición en flecha derecha -->
  <text x="475" y="250" font-size="9" fill="#2D6A4F" text-anchor="middle">Fase 2</text>
  <text x="475" y="262" font-size="9" fill="#2D6A4F" text-anchor="middle">2027</text>

  <!-- Condición en flecha izquierda -->
  <text x="140" y="250" font-size="9" fill="#2D6A4F" text-anchor="middle">Fase 2</text>
  <text x="140" y="262" font-size="9" fill="#2D6A4F" text-anchor="middle">2027</text>

  <!-- Etiqueta anillo 1 en arco -->
  <text x="490" y="320" font-size="11" fill="#2D6A4F" font-weight="600">Nivel 2:</text>
  <text x="490" y="335" font-size="10" fill="#2D6A4F">Medellín</text>
  <text x="490" y="350" font-size="9" fill="#2D6A4F">2027</text>

  <!-- Etiqueta anillo 2 en arco -->
  <text x="10" y="320" font-size="11" fill="#52B788" font-weight="600">Nivel 3:</text>
  <text x="10" y="335" font-size="10" fill="#52B788">Valle</text>
  <text x="10" y="350" font-size="9" fill="#52B788">Aburrá</text>
  <text x="10" y="365" font-size="9" fill="#52B788">2028</text>

  <!-- Leyenda -->
  <rect x="30" y="550" width="260" height="55" rx="8" fill="white" opacity="0.8" stroke="#E8F0EB"/>
  <line x1="50" y1="568" x2="90" y2="568" stroke="#1B4332" stroke-width="2"/>
  <text x="100" y="573" font-size="11" fill="#1A1A2E">Implementado</text>
  <line x1="50" y1="590" x2="90" y2="590" stroke="#2D6A4F" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="100" y="595" font-size="11" fill="#1A1A2E">Proyectado</text>

  <!-- Nota escalamiento condicionado -->
  <text x="310" y="575" font-size="9" fill="#E76F51" text-anchor="middle" font-style="italic">Escalamiento condicionado a resultados del piloto ISC</text>
  <text x="310" y="590" font-size="9" fill="#E76F51" text-anchor="middle" font-style="italic">Sem. 1–8 · 2026</text>
</svg>
