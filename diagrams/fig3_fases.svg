<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 350" font-family="'Inter', 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1B4332"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E76F51"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000025"/>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="950" height="350" fill="#F0F7F4"/>

  <!-- Título -->
  <text x="475" y="38" font-size="20" fill="#1B4332" font-weight="700" text-anchor="middle">Fases Metodológicas del Proyecto</text>

  <!-- FASE 1 -->
  <rect x="40" y="80" width="185" height="135" rx="12" fill="#1B4332" filter="url(#shadow)"/>
  <!-- Ícono libro -->
  <rect x="108" y="96" width="50" height="36" rx="3" fill="white" opacity="0.2"/>
  <line x1="115" y1="104" x2="150" y2="104" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="115" y1="111" x2="150" y2="111" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="115" y1="118" x2="140" y2="118" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <text x="132" y="156" font-size="16" fill="white" font-weight="700" text-anchor="middle">Fase 1</text>
  <text x="132" y="175" font-size="12" fill="#E8F0EB" text-anchor="middle">Investigación</text>
  <text x="132" y="191" font-size="12" fill="#E8F0EB" text-anchor="middle">y Diseño</text>
  <text x="132" y="208" font-size="10" fill="#52B788" text-anchor="middle" font-style="italic">Semanas 1–2</text>

  <!-- Flecha 1→2 -->
  <line x1="225" y1="147" x2="252" y2="147" stroke="#1B4332" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- FASE 2 -->
  <rect x="255" y="80" width="185" height="135" rx="12" fill="#2D6A4F" filter="url(#shadow)"/>
  <!-- Ícono circuito -->
  <line x1="318" y1="118" x2="318" y2="108" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="318" y1="108" x2="340" y2="108" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="340" y1="108" x2="340" y2="118" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <circle cx="329" cy="118" r="3" fill="white" opacity="0.6"/>
  <line x1="318" y1="126" x2="340" y2="126" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <text x="347" y="156" font-size="16" fill="white" font-weight="700" text-anchor="middle">Fase 2</text>
  <text x="347" y="175" font-size="12" fill="#E8F0EB" text-anchor="middle">Desarrollo del</text>
  <text x="347" y="191" font-size="12" fill="#E8F0EB" text-anchor="middle">Prototipo</text>
  <text x="347" y="208" font-size="10" fill="#A8DADC" text-anchor="middle" font-style="italic">Semanas 3–5</text>

  <!-- Flecha 2→3 -->
  <line x1="440" y1="147" x2="467" y2="147" stroke="#1B4332" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- FASE 3 -->
  <rect x="470" y="80" width="185" height="135" rx="12" fill="#52B788" filter="url(#shadow)"/>
  <!-- Ícono edificio -->
  <rect x="535" y="100" width="35" height="28" rx="2" fill="white" opacity="0.25"/>
  <rect x="541" y="106" width="8" height="8" rx="1" fill="white" opacity="0.4"/>
  <rect x="554" y="106" width="8" height="8" rx="1" fill="white" opacity="0.4"/>
  <rect x="548" y="118" width="8" height="10" rx="1" fill="white" opacity="0.35"/>
  <text x="562" y="156" font-size="16" fill="white" font-weight="700" text-anchor="middle">Fase 3</text>
  <text x="562" y="175" font-size="12" fill="#1A1A2E" text-anchor="middle">Despliegue</text>
  <text x="562" y="191" font-size="12" fill="#1A1A2E" text-anchor="middle">Piloto ISC</text>
  <text x="562" y="208" font-size="10" fill="#1B4332" text-anchor="middle" font-style="italic">Semanas 5–6</text>

  <!-- Flecha 3→4 -->
  <line x1="655" y1="147" x2="682" y2="147" stroke="#1B4332" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- FASE 4 -->
  <rect x="685" y="80" width="185" height="135" rx="12" fill="#E9C46A" filter="url(#shadow)"/>
  <!-- Ícono gráfico barras -->
  <rect x="744" y="120" width="8" height="12" rx="1" fill="#1B4332" opacity="0.5"/>
  <rect x="756" y="110" width="8" height="22" rx="1" fill="#1B4332" opacity="0.5"/>
  <rect x="768" y="115" width="8" height="17" rx="1" fill="#1B4332" opacity="0.5"/>
  <line x1="742" y1="132" x2="779" y2="132" stroke="#1B4332" stroke-width="1.5" opacity="0.5"/>
  <text x="777" y="156" font-size="16" fill="#1A1A2E" font-weight="700" text-anchor="middle">Fase 4</text>
  <text x="777" y="175" font-size="12" fill="#1A1A2E" text-anchor="middle">Evaluación y</text>
  <text x="777" y="191" font-size="12" fill="#1A1A2E" text-anchor="middle">Documentación</text>
  <text x="777" y="208" font-size="10" fill="#1B4332" text-anchor="middle" font-style="italic">Semanas 7–8</text>

  <!-- Flecha de retroalimentación iterativa (curva de Fase 4 → Fase 2) -->
  <path d="M 777 215 Q 777 290 512 290 Q 347 290 347 215" fill="none" stroke="#E76F51" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <text x="562" y="310" font-size="11" fill="#E76F51" text-anchor="middle" font-style="italic">Retroalimentación iterativa</text>

  <!-- Línea de progreso base -->
  <line x1="40" y1="240" x2="870" y2="240" stroke="#E8F0EB" stroke-width="1.5" stroke-dasharray="4,4"/>
</svg>
