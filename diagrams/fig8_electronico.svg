<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" font-family="'Inter', 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4895EF"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#52B788"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9B72CF"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E9C46A"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E63946"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000025"/>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="820" height="600" fill="#F0F7F4"/>

  <!-- Título -->
  <text x="410" y="32" font-size="17" fill="#1B4332" font-weight="700" text-anchor="middle">Esquema de Conexiones Eléctricas — Nodo RESPIRA</text>

  <!-- ====== ESP32 CENTRAL ====== -->
  <rect x="320" y="110" width="180" height="210" rx="8" fill="#1B4332" filter="url(#shadow)"/>
  <text x="410" y="138" font-size="14" fill="white" font-weight="700" text-anchor="middle">ESP32</text>
  <text x="410" y="157" font-size="12" fill="#52B788" text-anchor="middle">Wemos Lolin32</text>
  <!-- Pines izquierda del ESP32 -->
  <text x="328" y="186" font-size="8" fill="#A8DADC">GPIO16 (RX)</text>
  <text x="328" y="202" font-size="8" fill="#A8DADC">GPIO17 (TX)</text>
  <text x="328" y="218" font-size="8" fill="#52B788">GPIO4</text>
  <text x="328" y="234" font-size="8" fill="#E63946">5V</text>
  <text x="328" y="250" font-size="8" fill="#E63946">3.3V</text>
  <text x="328" y="266" font-size="8" fill="#888">GND</text>
  <!-- Pines derecha del ESP32 -->
  <text x="430" y="186" font-size="8" fill="#9B72CF">GPIO21 SDA</text>
  <text x="430" y="202" font-size="8" fill="#9B72CF">GPIO22 SCL</text>
  <text x="430" y="218" font-size="8" fill="#52B788">WiFi</text>
  <text x="430" y="234" font-size="8" fill="#E9C46A">UART</text>
  <text x="430" y="250" font-size="8" fill="#E8F0EB">MQTT</text>
  <text x="410" y="300" font-size="10" fill="#E9C46A" text-anchor="middle">OLED I²C</text>

  <!-- Líneas pin izquierda -->
  <line x1="320" y1="183" x2="310" y2="183" stroke="#4895EF" stroke-width="1.5"/>
  <line x1="320" y1="199" x2="310" y2="199" stroke="#4895EF" stroke-width="1.5"/>
  <line x1="320" y1="215" x2="310" y2="215" stroke="#52B788" stroke-width="1.5"/>
  <line x1="320" y1="231" x2="310" y2="231" stroke="#E63946" stroke-width="1.5"/>
  <line x1="320" y1="247" x2="310" y2="247" stroke="#E63946" stroke-width="1.5"/>
  <line x1="320" y1="263" x2="310" y2="263" stroke="#555" stroke-width="1.5"/>

  <!-- Líneas pin derecha -->
  <line x1="500" y1="183" x2="510" y2="183" stroke="#9B72CF" stroke-width="1.5"/>
  <line x1="500" y1="199" x2="510" y2="199" stroke="#9B72CF" stroke-width="1.5"/>

  <!-- ====== PMS5003 (izquierda) ====== -->
  <rect x="60" y="110" width="155" height="90" rx="8" fill="#2D6A4F" filter="url(#shadow)"/>
  <text x="137" y="138" font-size="12" fill="white" font-weight="700" text-anchor="middle">PMS5003</text>
  <text x="137" y="156" font-size="10" fill="#A8DADC" text-anchor="middle">Sensor partículas</text>
  <text x="137" y="173" font-size="9" fill="#E9C46A" text-anchor="middle">PM1.0 · PM2.5 · PM10</text>
  <text x="137" y="190" font-size="8" fill="white" text-anchor="middle">Alim: 5V</text>

  <!-- Conexión PMS5003 → ESP32 (UART) -->
  <line x1="215" y1="155" x2="310" y2="183" stroke="#4895EF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="215" y1="168" x2="310" y2="199" stroke="#4895EF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="255" y="162" font-size="8" fill="#4895EF" text-anchor="middle">TX→GPIO16</text>
  <text x="255" y="196" font-size="8" fill="#4895EF" text-anchor="middle">RX→GPIO17</text>
  <!-- Alimentación 5V PMS5003 -->
  <line x1="215" y1="180" x2="240" y2="180" stroke="#E63946" stroke-width="1.5"/>
  <line x1="240" y1="180" x2="240" y2="231" stroke="#E63946" stroke-width="1.5"/>
  <line x1="240" y1="231" x2="310" y2="231" stroke="#E63946" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="225" y="175" font-size="8" fill="#E63946">5V</text>

  <!-- ====== DHT22 (izquierda, abajo) ====== -->
  <rect x="60" y="250" width="155" height="75" rx="8" fill="#52B788" filter="url(#shadow)"/>
  <text x="137" y="275" font-size="12" fill="white" font-weight="700" text-anchor="middle">DHT22</text>
  <text x="137" y="292" font-size="10" fill="#1A1A2E" text-anchor="middle">Temperatura · Humedad</text>
  <text x="137" y="310" font-size="8" fill="#1B4332" text-anchor="middle">Alim: 3.3V</text>

  <!-- Conexión DHT22 → ESP32 (GPIO4) -->
  <line x1="215" y1="283" x2="310" y2="215" stroke="#52B788" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="248" y="255" font-size="8" fill="#52B788">GPIO4</text>
  <!-- Alimentación 3.3V DHT22 -->
  <line x1="215" y1="295" x2="260" y2="295" stroke="#E63946" stroke-width="1.5"/>
  <line x1="260" y1="295" x2="260" y2="247" stroke="#E63946" stroke-width="1.5"/>
  <line x1="260" y1="247" x2="310" y2="247" stroke="#E63946" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="225" y="292" font-size="8" fill="#E63946">3.3V</text>

  <!-- ====== BMP280 (derecha) ====== -->
  <rect x="545" y="110" width="155" height="90" rx="8" fill="#6B4FA0" filter="url(#shadow)"/>
  <text x="622" y="138" font-size="12" fill="white" font-weight="700" text-anchor="middle">BMP280</text>
  <text x="622" y="156" font-size="10" fill="#D4C4F5" text-anchor="middle">Presión · Altitud</text>
  <text x="622" y="173" font-size="9" fill="#E9C46A" text-anchor="middle">I²C Address: 0x76</text>
  <text x="622" y="190" font-size="8" fill="white" text-anchor="middle">Alim: 3.3V</text>

  <!-- Conexión BMP280 → ESP32 (I2C) -->
  <line x1="545" y1="148" x2="510" y2="183" stroke="#9B72CF" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="545" y1="161" x2="510" y2="199" stroke="#9B72CF" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="530" y="164" font-size="8" fill="#9B72CF">SDA</text>
  <text x="530" y="199" font-size="8" fill="#9B72CF">SCL</text>
  <!-- Etiqueta I2C -->
  <text x="530" y="145" font-size="8" fill="#9B72CF">I²C</text>

  <!-- ====== CIRCUITO DE POTENCIA (fila inferior) ====== -->

  <!-- Turbina -->
  <rect x="30" y="420" width="100" height="60" rx="8" fill="#2D6A4F" filter="url(#shadow)"/>
  <text x="80" y="446" font-size="11" fill="white" font-weight="700" text-anchor="middle">Turbina</text>
  <text x="80" y="463" font-size="9" fill="#A8DADC" text-anchor="middle">Savonius</text>
  <text x="80" y="475" font-size="8" fill="#E9C46A" text-anchor="middle">~AC</text>

  <!-- Flecha Turbina → Rectificador -->
  <line x1="130" y1="450" x2="158" y2="450" stroke="#E9C46A" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="144" y="444" font-size="8" fill="#E9C46A">~AC</text>

  <!-- Rectificador -->
  <rect x="158" y="420" width="110" height="60" rx="8" fill="#495057" filter="url(#shadow)"/>
  <text x="213" y="446" font-size="10" fill="white" font-weight="700" text-anchor="middle">Rectificador</text>
  <text x="213" y="462" font-size="9" fill="#E8F0EB" text-anchor="middle">Puente Graetz</text>
  <text x="213" y="474" font-size="8" fill="#E9C46A" text-anchor="middle">~12V DC</text>

  <!-- Flecha Rectificador → TP4056 -->
  <line x1="268" y1="450" x2="296" y2="450" stroke="#E9C46A" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="282" y="444" font-size="8" fill="#E9C46A">DC</text>

  <!-- TP4056 Cargador -->
  <rect x="296" y="420" width="110" height="60" rx="8" fill="#E9C46A" filter="url(#shadow)"/>
  <text x="351" y="446" font-size="10" fill="#1A1A2E" font-weight="700" text-anchor="middle">TP4056</text>
  <text x="351" y="462" font-size="9" fill="#1A1A2E" text-anchor="middle">Cargador LiPo</text>
  <text x="351" y="474" font-size="8" fill="#1B4332" text-anchor="middle">4.2V max</text>

  <!-- Flecha TP4056 → Batería LiPo -->
  <line x1="406" y1="450" x2="434" y2="450" stroke="#E9C46A" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="420" y="444" font-size="8" fill="#E9C46A">4.2V</text>

  <!-- Batería LiPo -->
  <rect x="434" y="420" width="100" height="60" rx="8" fill="#1B4332" filter="url(#shadow)"/>
  <text x="484" y="446" font-size="10" fill="white" font-weight="700" text-anchor="middle">LiPo</text>
  <text x="484" y="462" font-size="9" fill="#52B788" text-anchor="middle">3.7V · 2200mAh</text>
  <text x="484" y="475" font-size="8" fill="#E9C46A" text-anchor="middle">3.7V</text>

  <!-- Flecha LiPo → Regulador 5V -->
  <line x1="534" y1="450" x2="562" y2="450" stroke="#E63946" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="548" y="444" font-size="8" fill="#E63946">3.7V</text>

  <!-- Regulador 5V MT3608 -->
  <rect x="562" y="420" width="120" height="60" rx="8" fill="#2D6A4F" filter="url(#shadow)"/>
  <text x="622" y="443" font-size="10" fill="white" font-weight="700" text-anchor="middle">MT3608</text>
  <text x="622" y="460" font-size="9" fill="#A8DADC" text-anchor="middle">Regulador 5V</text>
  <text x="622" y="474" font-size="8" fill="#E9C46A" text-anchor="middle">Step-Up Boost</text>

  <!-- Flecha Regulador → ESP32 (5V) -->
  <line x1="622" y1="420" x2="622" y2="370" stroke="#E63946" stroke-width="2"/>
  <line x1="622" y1="370" x2="500" y2="370" stroke="#E63946" stroke-width="2"/>
  <line x1="500" y1="370" x2="500" y2="320" stroke="#E63946" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="555" y="365" font-size="8" fill="#E63946">5V → ESP32</text>

  <!-- Flecha desde ESP32 hacia BMP (3.3V) -->
  <line x1="680" y1="220" x2="700" y2="220" stroke="#E63946" stroke-width="1.5"/>
  <line x1="700" y1="220" x2="700" y2="145" stroke="#E63946" stroke-width="1.5"/>
  <line x1="700" y1="145" x2="700" y2="145" stroke="#E63946" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="720" y="180" font-size="8" fill="#E63946">3.3V</text>

  <!-- ====== LEYENDA DE COLORES ====== -->
  <rect x="30" y="500" width="370" height="85" rx="8" fill="white" opacity="0.75" stroke="#E8F0EB"/>
  <text x="215" y="520" font-size="11" fill="#1B4332" font-weight="700" text-anchor="middle">Leyenda de cables</text>
  <circle cx="50" cy="537" r="5" fill="#4895EF"/>
  <text x="62" y="542" font-size="10" fill="#1A1A2E">Azul: UART (PMS5003)</text>
  <circle cx="50" cy="553" r="5" fill="#52B788"/>
  <text x="62" y="558" font-size="10" fill="#1A1A2E">Verde: GPIO Digital (DHT22)</text>
  <circle cx="195" cy="537" r="5" fill="#9B72CF"/>
  <text x="207" y="542" font-size="10" fill="#1A1A2E">Púrpura: I²C (BMP280)</text>
  <circle cx="195" cy="553" r="5" fill="#E63946"/>
  <text x="207" y="558" font-size="10" fill="#1A1A2E">Rojo: VCC / Alimentación</text>
  <circle cx="50" cy="571" r="5" fill="#555"/>
  <text x="62" y="576" font-size="10" fill="#1A1A2E">Negro: GND</text>
  <circle cx="195" cy="571" r="5" fill="#E9C46A"/>
  <text x="207" y="576" font-size="10" fill="#1A1A2E">Amarillo: Energía eólica</text>
</svg>
